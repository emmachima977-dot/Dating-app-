<!DOCTYPE html>
<html>
<head>
<title>Sign Up - Single</title>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabaseUrl = "https://hmoihzpztvqhokezgkhq.supabase.co";
const supabaseKey = "sb_publishable_Yg9OXA-zVmWGlDlgSokSGQ_M3cLhjXf";

const supabase = createClient(supabaseUrl, supabaseKey);

window.signup = async function () {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { error } = await supabase.auth.signUp({
email,
password,
});

if(error){
alert(error.message);
}else{
alert("Account created successfully!");
window.location.href = "login.html";
}

}
</script>

<style>

body{
font-family:Arial;
background:#ff4d6d;
text-align:center;
padding:40px;
color:white;
}

input{
width:90%;
max-width:300px;
padding:12px;
margin:10px;
border:none;
border-radius:10px;
}

button{
padding:12px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff4d6d;
font-size:18px;
font-weight:bold;
}

</style>

</head>

<body>

<h1>❤️ Join Single</h1>

<input type="text" placeholder="Full Name">

<br>

<input
id="email"
type="email"
placeholder="Email">

<br>

<input
id="password"
type="password"
placeholder="Password">

<br><br>

<button onclick="signup()">Create Account</button>

<br><br>

<a href="login.html" style="color:white;">
Already have an account? Login
</a>

</body>
</html>
